<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Blue rounded background -->
  <rect width="32" height="32" rx="6" fill="#2563eb"/>
  <!-- Top-left finder pattern -->
  <rect x="3" y="3" width="11" height="11" rx="1.5" fill="white"/>
  <rect x="5" y="5" width="7" height="7" rx="1" fill="#2563eb"/>
  <rect x="6.5" y="6.5" width="4" height="4" rx="0.5" fill="white"/>
  <!-- Top-right finder pattern -->
  <rect x="18" y="3" width="11" height="11" rx="1.5" fill="white"/>
  <rect x="20" y="5" width="7" height="7" rx="1" fill="#2563eb"/>
  <rect x="21.5" y="6.5" width="4" height="4" rx="0.5" fill="white"/>
  <!-- Bottom-left finder pattern -->
  <rect x="3" y="18" width="11" height="11" rx="1.5" fill="white"/>
  <rect x="5" y="20" width="7" height="7" rx="1" fill="#2563eb"/>
  <rect x="6.5" y="21.5" width="4" height="4" rx="0.5" fill="white"/>
  <!-- Data dots (bottom-right quadrant) -->
  <rect x="16" y="16" width="3" height="3" rx="0.5" fill="white"/>
  <rect x="20" y="16" width="3" height="3" rx="0.5" fill="white"/>
  <rect x="24" y="16" width="4" height="3" rx="0.5" fill="white"/>
  <rect x="16" y="20" width="3" height="3" rx="0.5" fill="white"/>
  <rect x="22" y="21" width="3" height="3" rx="0.5" fill="white"/>
  <rect x="20" y="25" width="3" height="3" rx="0.5" fill="white"/>
  <rect x="24" y="24" width="4" height="4" rx="0.5" fill="white"/>
</svg>
